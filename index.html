<!DOCTYPE html>
<html lang="pl">
<head>
<script>
// Early function definitions — available before DOM fully loads
function toggleMenu(){
  try{
    var h=document.getElementById('hamburger');
    var m=document.getElementById('mobile-menu');
    if(!h||!m)return;
    h.classList.toggle('open');
    m.classList.toggle('open');
    document.body.style.overflow=m.classList.contains('open')?'hidden':'';
  }catch(e){}
}
function closeMenu(){
  try{
    document.getElementById('hamburger').classList.remove('open');
    document.getElementById('mobile-menu').classList.remove('open');
    document.body.style.overflow='';
  }catch(e){}
}
function skipIntro(){
  try{
    var intro=document.getElementById('intro');
    if(!intro)return;
    intro.style.opacity='0';
    intro.style.visibility='hidden';
    intro.style.pointerEvents='none';
    setTimeout(function(){intro.style.display='none';},800);
  }catch(e){}
}
function toggleMix(card,tlId){
  try{
    var tl=document.getElementById(tlId);
    var isOpen=tl.classList.contains('open');
    document.querySelectorAll('.mix-card').forEach(function(c){c.classList.remove('active')});
    document.querySelectorAll('.mix-tracklist').forEach(function(t){t.classList.remove('open')});
    document.querySelectorAll('.mix-toggle').forEach(function(b){b.innerHTML='tracklista &#9660;'});
    if(!isOpen){tl.classList.add('open');card.classList.add('active');card.querySelector('.mix-toggle').innerHTML='tracklista &#9650;';}
  }catch(e){}
}
function submitBooking(){
  try{
    var name=document.getElementById('f-name').value.trim();
    var email=document.getElementById('f-email').value.trim();
    if(!name||!email){alert('Podaj imię i e-mail.');return;}
    var date=document.getElementById('f-date').value;
    var type=document.getElementById('f-type').value;
    var msg=document.getElementById('f-msg').value.trim();
    var sub=encodeURIComponent('Booking NOR: '+(date||'?')+' - '+(type||'event'));
    var body=encodeURIComponent('Imie: '+name+'\nEmail: '+email+'\nData: '+date+'\nRodzaj: '+type+'\n\n'+msg);
    window.location.href='mailto:igor.bernakiewicz@gmail.com?subject='+sub+'&body='+body;
  }catch(e){}
}
</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NØR</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --black:   #070709;
  --deep:    #0E0816;
  --void:    #12091A;
  --violet:  #9D4EFF;
  --dim:     #3D1F6E;
  --mid:     #6B35C8;
  --grey:    #666677;
  --light:   #C8C4DC;
  --white:   #EEEAF8;
}

html{scroll-behavior:smooth}
body{background:var(--black);color:var(--white);font-family:'Space Mono',monospace;font-size:13px;line-height:1.6;overflow-x:hidden}

/* ── CURSOR ── */
*{cursor:none!important}
.cursor{position:fixed;pointer-events:none;z-index:99999;mix-blend-mode:exclusion}
.cursor-ring{width:28px;height:28px;border:1px solid var(--violet);border-radius:50%;transform:translate(-50%,-50%);transition:width .2s,height .2s,border-color .2s}
.cursor-dot{width:3px;height:3px;background:var(--violet);border-radius:50%;transform:translate(-50%,-50%);position:absolute;left:0;top:0}
.cursor-ring::before,.cursor-ring::after{content:'';position:absolute;background:var(--violet);opacity:.4}
.cursor-ring::before{width:1px;height:8px;left:50%;top:-12px;transform:translateX(-50%)}
.cursor-ring::after{width:8px;height:1px;top:50%;left:-12px;transform:translateY(-50%)}
.cursor.hover .cursor-ring{width:44px;height:44px;border-color:var(--white)}
@media(hover:none){.cursor{display:none}*{cursor:auto!important}}

/* ── NAV ── */
nav{
  position:fixed;top:0;left:0;right:0;z-index:100;
  display:flex;justify-content:space-between;align-items:center;
  padding:20px 40px;
  background:linear-gradient(to bottom,rgba(7,7,9,.95),transparent);
}
.nav-logo{font-family:'Bebas Neue','Arial Black','Arial',sans-serif;font-size:20px;letter-spacing:.15em;color:var(--white);text-decoration:none}
.nav-logo span{color:var(--violet)}
.nav-links{display:flex;gap:28px;list-style:none}
.nav-links a{font-size:10px;letter-spacing:.3em;text-transform:uppercase;color:var(--grey);text-decoration:none;transition:color .2s}
.nav-links a:hover{color:var(--violet)}
.hamburger{display:none;flex-direction:column;gap:5px;background:none;border:none;padding:4px;z-index:200}
.hamburger span{display:block;width:22px;height:1px;background:var(--white);transition:transform .3s,opacity .3s}
.hamburger.open span:nth-child(1){transform:translateY(6px) rotate(45deg);background:var(--violet)}
.hamburger.open span:nth-child(2){opacity:0}
.hamburger.open span:nth-child(3){transform:translateY(-6px) rotate(-45deg);background:var(--violet)}
.mobile-menu{display:none;position:fixed;inset:0;background:rgba(7,7,9,.97);z-index:150;flex-direction:column;align-items:center;justify-content:center;gap:4px}
.mobile-menu.open{display:flex}
.mobile-menu a{font-family:'Bebas Neue','Arial Black','Arial',sans-serif;font-size:42px;letter-spacing:.05em;color:var(--white);text-decoration:none;padding:6px 0;transition:color .2s}
.mobile-menu a:hover{color:var(--violet)}

/* ── HERO ── */
.hero{
  position:relative;height:100vh;min-height:600px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  overflow:hidden;
  background:radial-gradient(ellipse at 50% 60%,#1A0A2E 0%,var(--black) 70%);
}

/* animated grain */
.hero-grain{
  position:absolute;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.07'/%3E%3C/svg%3E");
  opacity:.5;animation:grain .6s steps(2) infinite;pointer-events:none;z-index:1;
}
@keyframes grain{0%,100%{transform:translate(0,0)}25%{transform:translate(-1%,1%)}50%{transform:translate(1%,-1%)}75%{transform:translate(-1%,-1%)}}

/* scanline */
.hero::after{
  content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(to bottom,transparent 0,transparent 3px,rgba(0,0,0,.12) 3px,rgba(0,0,0,.12) 4px);
  pointer-events:none;z-index:2;
}

/* oscilloscope */
#hero-osc{position:absolute;inset:0;width:100%;height:100%;z-index:1;opacity:.35;pointer-events:none}

.hero-content{position:relative;z-index:3;text-align:center}

/* GLITCH logo — the signature */
.glitch-wrap{position:relative;display:inline-block;margin-bottom:20px}
.glitch-name{
  font-family:'Bebas Neue','Arial Black','Arial',sans-serif;
  font-size:clamp(100px,20vw,240px);
  font-weight:400;
  letter-spacing:.02em;
  color:var(--white);
  line-height:1;
  position:relative;
  display:block;
  user-select:none;
}
.glitch-name::before,.glitch-name::after{
  content:attr(data-text);
  position:absolute;inset:0;
  font-family:'Bebas Neue','Arial Black','Arial',sans-serif;
  font-size:inherit;letter-spacing:inherit;
}
.glitch-name::before{
  color:var(--violet);
  clip-path:polygon(0 20%,100% 20%,100% 40%,0 40%);
  transform:translateX(-3px);
  animation:glitch-a 3.5s infinite;
  opacity:.8;
}
.glitch-name::after{
  color:#00FFFF;
  clip-path:polygon(0 60%,100% 60%,100% 75%,0 75%);
  transform:translateX(3px);
  animation:glitch-b 3.5s infinite;
  opacity:.5;
  mix-blend-mode:screen;
}
@keyframes glitch-a{
  0%,94%,100%{transform:translateX(0);clip-path:polygon(0 20%,100% 20%,100% 40%,0 40%)}
  95%{transform:translateX(-6px) skewX(-2deg);clip-path:polygon(0 15%,100% 15%,100% 35%,0 35%)}
  97%{transform:translateX(4px);clip-path:polygon(0 25%,100% 25%,100% 45%,0 45%)}
}
@keyframes glitch-b{
  0%,92%,100%{transform:translateX(0);clip-path:polygon(0 60%,100% 60%,100% 75%,0 75%)}
  93%{transform:translateX(8px) skewX(3deg);clip-path:polygon(0 55%,100% 55%,100% 70%,0 70%)}
  96%{transform:translateX(-4px);clip-path:polygon(0 65%,100% 65%,100% 80%,0 80%)}
}

.hero-sub{font-size:11px;letter-spacing:.4em;text-transform:uppercase;color:var(--grey);margin-bottom:8px}
.hero-tagline{font-size:11px;letter-spacing:.2em;color:var(--dim);text-transform:uppercase;margin-top:6px}
.hero-tagline span{color:var(--violet)}

.scroll-hint{
  position:absolute;bottom:28px;left:50%;transform:translateX(-50%);z-index:3;
  display:flex;flex-direction:column;align-items:center;gap:8px;
  color:var(--dim);font-size:10px;letter-spacing:.25em;text-transform:uppercase;
  animation:pulse 2.4s ease-in-out infinite;
}
.scroll-hint::after{content:'';display:block;width:1px;height:36px;background:linear-gradient(to bottom,var(--dim),transparent)}
@keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}

/* ── SECTION COMMON ── */
section,div.section{padding:100px 40px;max-width:1100px;margin:0 auto}
.full-bleed{max-width:none!important;padding-left:40px;padding-right:40px}
.section-label{
  font-size:10px;letter-spacing:.4em;color:var(--violet);
  text-transform:uppercase;margin-bottom:48px;
  display:flex;align-items:center;gap:16px;
}
.section-label::after{content:'';flex:1;max-width:60px;height:1px;background:var(--dim)}

/* ── ABOUT ── */
.about-grid{display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:start}
.about-heading{
  font-family:'Bebas Neue','Arial Black','Arial',sans-serif;
  font-size:clamp(40px,6vw,72px);
  line-height:1;letter-spacing:.03em;
  color:var(--white);margin-bottom:28px;
}
.about-heading em{color:var(--violet);font-style:normal}
.about-text{color:var(--light);line-height:1.8;font-size:13px}
.about-text p+p{margin-top:18px}
.tags{margin-top:28px;display:flex;flex-wrap:wrap;gap:8px}
.tag{font-size:10px;letter-spacing:.2em;text-transform:uppercase;border:1px solid var(--dim);color:var(--violet);padding:4px 12px}
.stat-list{display:flex;flex-direction:column}
.stat-item{display:flex;justify-content:space-between;align-items:baseline;padding:16px 0;border-bottom:1px solid #1a1025}
.stat-key{font-size:10px;letter-spacing:.25em;text-transform:uppercase;color:var(--grey)}
.stat-val{font-family:'Bebas Neue','Arial Black','Arial',sans-serif;font-size:20px;letter-spacing:.05em;color:var(--white);text-align:right}

/* ── MUSIC ── */
#music-bg{background:#0A0714;padding:100px 40px}
#music-bg > div{max-width:1100px;margin:0 auto}
.sc-embed{border:1px solid #1a1025}

/* ── GALLERY ── */
.gallery-grid{display:grid;grid-template-columns:repeat(12,1fr);grid-template-rows:220px 220px;gap:3px}
.gallery-item{position:relative;overflow:hidden;border:1px solid #1a1025}
.gallery-item:nth-child(1){grid-column:span 5;grid-row:span 2}
.gallery-item:nth-child(2){grid-column:span 4}
.gallery-item:nth-child(3){grid-column:span 3}
.gallery-item:nth-child(4){grid-column:span 3}
.gallery-item:nth-child(5){grid-column:span 4}
.gallery-ph{
  width:100%;height:100%;
  background:linear-gradient(135deg,#0E0720 0%,#1A0A30 50%,#08040F 100%);
  display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;
}
.gallery-ph::before{
  content:'';position:absolute;inset:-50%;width:200%;height:200%;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.12'/%3E%3C/svg%3E");
  opacity:.4;animation:grain .8s steps(2) infinite;
}
.gallery-ph::after{
  content:'';position:absolute;left:0;right:0;height:1px;background:var(--dim);opacity:.3;top:50%;
  animation:scan 5s linear infinite;
}
@keyframes scan{0%{top:0%;opacity:0}10%{opacity:.4}90%{opacity:.4}100%{top:100%;opacity:0}}
.gallery-ph-label{position:relative;z-index:1;font-size:10px;letter-spacing:.3em;text-transform:uppercase;color:#2a1545;text-align:center}
.gallery-overlay{position:absolute;inset:0;background:rgba(7,7,9,.7);display:flex;align-items:flex-end;padding:14px;opacity:0;transition:opacity .3s}
.gallery-item:hover .gallery-overlay{opacity:1}
.gallery-item:hover{border-color:var(--dim)}
.gallery-overlay-text{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--violet)}

/* ── EVENTS ── */
#events-bg{background:#0A0714;padding:100px 40px}
#events-bg > div{max-width:1100px;margin:0 auto}
.events-list{display:flex;flex-direction:column;gap:2px}
.event-card{
  display:grid;grid-template-columns:110px 1fr auto;align-items:center;gap:28px;
  background:#0E0818;border:1px solid #1a1025;padding:24px 28px;
  text-decoration:none;color:inherit;transition:border-color .25s,background .25s;
}
.event-card:hover{border-color:var(--dim);background:#160D28}
.event-day{font-family:'Bebas Neue','Arial Black','Arial',sans-serif;font-size:44px;color:var(--violet);line-height:1}
.event-month{font-size:10px;letter-spacing:.3em;text-transform:uppercase;color:var(--grey);margin-top:2px}
.event-dow{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:#333}
.event-title{font-family:'Bebas Neue','Arial Black','Arial',sans-serif;font-size:22px;letter-spacing:.05em;color:var(--white);margin-bottom:4px}
.event-lineup{font-size:11px;color:var(--grey)}
.event-lineup strong{color:var(--violet);font-weight:400}
.event-venue{font-family:'Bebas Neue','Arial Black','Arial',sans-serif;font-size:16px;letter-spacing:.05em;color:var(--white);text-align:right}
.event-city{font-size:10px;letter-spacing:.25em;text-transform:uppercase;color:var(--grey);margin-top:2px}
.event-cta{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--dim);border:1px solid var(--dim);padding:4px 10px;margin-top:6px;display:inline-block;transition:color .2s,border-color .2s}
.event-card:hover .event-cta{color:var(--violet);border-color:var(--violet)}
.events-footer{margin-top:20px;text-align:right}
.events-footer a{font-size:10px;letter-spacing:.25em;text-transform:uppercase;color:var(--grey);text-decoration:none;transition:color .2s}
.events-footer a:hover{color:var(--violet)}

/* ── MIXES ── */
.mixes-list{display:flex;flex-direction:column;gap:2px}
.mix-card{
  display:grid;grid-template-columns:44px 1fr auto;align-items:center;gap:20px;
  background:#0E0818;border:1px solid #1a1025;padding:18px 24px;
  transition:border-color .25s,background .25s;cursor:pointer;
}
.mix-card:hover,.mix-card.active{border-color:var(--dim);background:#160D28}
.mix-card.active .mix-play-btn{background:var(--violet);color:var(--black)}
.mix-play-btn{width:34px;height:34px;border:1px solid var(--dim);background:transparent;color:var(--violet);display:flex;align-items:center;justify-content:center;font-size:11px;transition:background .2s,color .2s;flex-shrink:0}
.mix-title{font-family:'Bebas Neue','Arial Black','Arial',sans-serif;font-size:18px;letter-spacing:.05em;color:var(--white);margin-bottom:3px}
.mix-meta{font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--grey)}
.mix-duration{font-size:11px;color:var(--grey)}
.mix-toggle{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--dim);background:none;border:none;font-family:'Space Mono',monospace;transition:color .2s;margin-top:3px;display:block;text-align:right}
.mix-toggle:hover{color:var(--violet)}
.mix-tracklist{display:none;flex-direction:column;background:#0E0818;border:1px solid #1a1025;border-top:none;margin-bottom:2px}
.mix-tracklist.open{display:flex}
.track-row{display:flex;align-items:baseline;gap:14px;padding:9px 24px 9px calc(24px + 44px + 20px);border-bottom:1px solid #110820;transition:background .15s}
.track-row:last-child{border-bottom:none}
.track-row:hover{background:#130B22}
.track-num{font-size:10px;color:var(--dim);min-width:22px}
.track-name{font-size:12px;color:var(--light);flex:1}
.track-artist{font-size:11px;color:var(--grey)}

/* ── LIBRARY CTA ── */
.library-cta{
  background:linear-gradient(135deg,#0E0818,#160D28);
  border:1px solid var(--dim);padding:60px 48px;
  display:flex;align-items:center;justify-content:space-between;gap:40px;
  text-decoration:none;color:inherit;transition:border-color .3s,background .3s;
  margin-top:0;
}
.library-cta:hover{border-color:var(--violet);background:linear-gradient(135deg,#160D28,#1E1035)}
.library-cta-text{}
.library-cta-title{font-family:'Bebas Neue','Arial Black','Arial',sans-serif;font-size:clamp(32px,4vw,52px);letter-spacing:.03em;color:var(--white);margin-bottom:8px}
.library-cta-title span{color:var(--violet)}
.library-cta-desc{font-size:12px;color:var(--grey);line-height:1.6}
.library-cta-arrow{font-family:'Bebas Neue','Arial Black','Arial',sans-serif;font-size:64px;color:var(--dim);transition:color .3s,transform .3s;flex-shrink:0}
.library-cta:hover .library-cta-arrow{color:var(--violet);transform:translateX(8px)}

/* ── TIMELINE ── */
.timeline-list{position:relative;padding-left:36px}
.timeline-list::before{content:'';position:absolute;left:0;top:0;bottom:0;width:1px;background:linear-gradient(to bottom,transparent,var(--dim) 10%,var(--dim) 90%,transparent)}
.timeline-item{position:relative;padding:0 0 44px 28px;opacity:0;transform:translateX(-10px);transition:opacity .5s ease,transform .5s ease}
.timeline-item.visible{opacity:1;transform:translateX(0)}
.timeline-item:last-child{padding-bottom:0}
.timeline-item::before{content:'';position:absolute;left:-5px;top:6px;width:10px;height:10px;border-radius:50%;background:var(--black);border:1px solid var(--dim)}
.timeline-item.highlight::before{background:var(--violet);border-color:var(--violet);box-shadow:0 0 14px rgba(157,78,255,.5)}
.timeline-year{font-size:10px;letter-spacing:.3em;text-transform:uppercase;color:var(--violet);margin-bottom:5px}
.timeline-title{font-family:'Bebas Neue','Arial Black','Arial',sans-serif;font-size:20px;letter-spacing:.05em;color:var(--white);margin-bottom:4px}
.timeline-desc{font-size:12px;color:var(--grey);line-height:1.6}

/* ── MANIFEST ── */
#manifest-bg{background:#0A0714;padding:120px 40px}
#manifest-bg > div{max-width:860px;margin:0 auto;text-align:center}
.manifest-quote{
  font-family:'Bebas Neue','Arial Black','Arial',sans-serif;
  font-size:clamp(28px,4.5vw,52px);
  letter-spacing:.03em;line-height:1.25;
  color:var(--white);margin-bottom:36px;
}
.manifest-quote em{color:var(--violet);font-style:normal}
.manifest-sig{font-size:10px;letter-spacing:.4em;text-transform:uppercase;color:var(--grey)}

/* ── PRESS ── */
.press-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:2px}
.press-card{background:#0E0818;border:1px solid #1a1025;padding:32px 28px}
.press-quote{font-family:'Space Mono',monospace;font-size:13px;line-height:1.7;color:var(--light);margin-bottom:22px;position:relative}
.press-quote::before{content:'"';font-family:'Bebas Neue','Arial Black','Arial',sans-serif;font-size:64px;line-height:.5;color:var(--dim);display:block;margin-bottom:14px}
.press-source{border-top:1px solid #1a1025;padding-top:14px}
.press-author{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--violet)}
.press-outlet{font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--grey);margin-top:2px}

/* ── AFFILIATIONS ── */
.affil-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:2px}
.affil-card{background:#0E0818;border:1px solid #1a1025;padding:28px 24px;text-decoration:none;color:inherit;display:block;transition:border-color .25s,background .25s}
.affil-card:hover{border-color:var(--dim);background:#160D28}
.affil-role{font-size:10px;letter-spacing:.3em;text-transform:uppercase;color:var(--violet);margin-bottom:8px}
.affil-name{font-family:'Bebas Neue','Arial Black','Arial',sans-serif;font-size:22px;letter-spacing:.05em;color:var(--white);margin-bottom:8px}
.affil-desc{font-size:11px;color:var(--grey);line-height:1.6}

/* ── BOOKING ── */
#booking-bg{background:#0A0714;padding:100px 40px}
#booking-bg > div{max-width:680px;margin:0 auto}
.booking-form{display:flex;flex-direction:column;gap:2px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:2px}
.form-field{display:flex;flex-direction:column}
.form-label{font-size:10px;letter-spacing:.3em;text-transform:uppercase;color:var(--violet);padding:12px 18px 0;background:#0E0818;border:1px solid #1a1025;border-bottom:none}
.form-input,.form-textarea,.form-select{background:#0E0818;border:1px solid #1a1025;border-top:none;color:var(--white);font-family:'Space Mono',monospace;font-size:12px;padding:8px 18px 14px;outline:none;transition:border-color .2s;width:100%;-webkit-appearance:none;appearance:none}
.form-input:focus,.form-textarea:focus,.form-select:focus{border-color:var(--dim)}
.form-input::placeholder,.form-textarea::placeholder{color:#333}
.form-textarea{height:110px;resize:none}
.form-submit{background:transparent;border:1px solid var(--violet);color:var(--violet);font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.3em;text-transform:uppercase;padding:16px 36px;margin-top:2px;align-self:flex-start;transition:background .2s,color .2s}
.form-submit:hover{background:var(--violet);color:var(--black)}
.form-note{font-size:10px;color:#333;margin-top:14px}

/* ── CONTACT ── */
.contact-block{display:flex;flex-direction:column}
.contact-item{display:flex;align-items:baseline;gap:18px;padding:20px 0;border-bottom:1px solid #1a1025}
.contact-label{font-size:10px;letter-spacing:.3em;text-transform:uppercase;color:var(--grey);min-width:80px}
.contact-val{font-family:'Bebas Neue','Arial Black','Arial',sans-serif;font-size:22px;letter-spacing:.05em;color:var(--white);text-decoration:none;transition:color .2s}
.contact-val:hover{color:var(--violet)}

/* ── FOOTER ── */
footer{border-top:1px solid #1a1025;padding:28px 40px;display:flex;justify-content:space-between;align-items:center;color:#333;font-size:10px;letter-spacing:.2em;text-transform:uppercase}

/* ── RESPONSIVE ── */
@media(max-width:860px){
  nav{padding:16px 20px}
  .nav-links{display:none}
  .hamburger{display:flex}
  section,div.section{padding:70px 20px}
  .about-grid{grid-template-columns:1fr;gap:44px}
  .gallery-grid{grid-template-columns:1fr 1fr;grid-template-rows:auto}
  .gallery-item:nth-child(n){grid-column:span 1;grid-row:span 1;height:150px}
  .gallery-item:nth-child(1){grid-column:span 2;height:190px}
  .event-card{grid-template-columns:80px 1fr;gap:16px}
  .event-card > *:last-child{display:none}
  .form-row{grid-template-columns:1fr}
  footer{flex-direction:column;gap:10px;text-align:center}
  #music-bg,#events-bg,#manifest-bg,#booking-bg{padding:70px 20px}
  .library-cta{flex-direction:column;text-align:center}
  .library-cta-arrow{display:none}
  .track-row{padding-left:20px}
}

@media(prefers-reduced-motion:reduce){
  #hero-osc,.glitch-name::before,.glitch-name::after{display:none}
  .scroll-hint{animation:none}
  .timeline-item{opacity:1;transform:none}
}

::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:var(--black)}
::-webkit-scrollbar-thumb{background:var(--dim);border-radius:2px}
</style>

<script>
// Safety net — if page takes too long, force skip intro after 3s absolute max
window.addEventListener('load', function() {
  setTimeout(function() {
    var intro = document.getElementById('intro');
    if(intro && intro.style.display !== 'none') {
      intro.style.opacity='0';
      intro.style.visibility='hidden';
      intro.style.pointerEvents='none';
      setTimeout(function(){intro.style.display='none';},500);
    }
  }, 3000);
});
</script>
<div class="cursor" id="cursor"><div class="cursor-ring"></div><div class="cursor-dot"></div></div>

<!-- INTRO -->
<div id="intro" style="position:fixed;inset:0;z-index:9999;background:var(--black);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:28px;transition:opacity .8s,visibility .8s">
  <canvas id="intro-osc" style="position:absolute;inset:0;width:100%;height:100%;opacity:.35"></canvas>
  <div style="position:relative;z-index:2;text-align:center">
    <div id="intro-name" style="font-family:'Bebas Neue','Arial Black','Arial',sans-serif;font-size:clamp(80px,16vw,180px);color:var(--white);line-height:1;letter-spacing:.05em"></div>
  </div>
  <div style="position:relative;z-index:2;width:180px;height:1px;background:#1a1025;overflow:hidden">
    <div style="position:absolute;left:-100%;top:0;width:100%;height:100%;background:var(--violet);animation:introLoad 2.4s ease forwards"></div>
  </div>
  <button onclick="skipIntro()" style="position:absolute;bottom:28px;right:36px;background:none;border:none;font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.3em;text-transform:uppercase;color:#333;z-index:2;transition:color .2s" onmouseover="this.style.color='var(--violet)'" onmouseout="this.style.color='#333'">pomiń esc</button>

<style>@keyframes introLoad{0%{left:-100%}100%{left:0%;transition-duration:1.5s}}</style>
